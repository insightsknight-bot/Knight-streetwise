<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Admin</title>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- ============================================================
         Same Firebase project as index.html — paste the identical
         config here so this page reads/writes the same database.
         ============================================================ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore, collection, query, orderBy, onSnapshot,
            doc, addDoc, updateDoc, deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.knightAdmin = {
            auth, db, collection, query, orderBy, onSnapshot,
            doc, addDoc, updateDoc, deleteDoc,
            signInWithEmailAndPassword, signOut, onAuthStateChanged
        };
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        matte: '#0D0D0D', graphite: '#1A1A1A', charcoal: '#2C2C2C',
                        offwhite: '#F4F4F0', bone: '#E8E6DF', silver: '#A0A0A0',
                        chrome: '#E0E0E0', crimson: '#C41E3A'
                    },
                    fontFamily: {
                        display: ['Clash Display', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-matte text-offwhite font-body antialiased min-h-screen"
      x-data="adminApp()" x-init="init()">

    <!-- LOGIN -->
    <div x-show="!user" x-cloak class="min-h-screen flex items-center justify-center px-6">
        <form @submit.prevent="login()" class="w-full max-w-sm">
            <h1 class="font-display font-bold text-2xl tracking-[0.2em] uppercase mb-1">Knight</h1>
            <p class="text-silver text-sm mb-8">Admin sign in</p>
            <label class="block text-xs uppercase tracking-wider text-silver mb-2">Email</label>
            <input x-model="email" type="email" required autocomplete="username"
                   class="w-full bg-graphite border border-charcoal px-4 py-3 mb-4 text-sm focus:outline-none focus:border-chrome">
            <label class="block text-xs uppercase tracking-wider text-silver mb-2">Password</label>
            <input x-model="password" type="password" required autocomplete="current-password"
                   class="w-full bg-graphite border border-charcoal px-4 py-3 mb-6 text-sm focus:outline-none focus:border-chrome">
            <button type="submit" class="w-full bg-bone text-matte py-3 font-display font-bold uppercase tracking-widest text-sm hover:bg-offwhite transition-colors">
                Sign In
            </button>
            <p x-show="error" x-cloak x-text="error" class="text-crimson text-sm mt-4"></p>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div x-show="user" x-cloak>
        <header class="border-b border-charcoal px-6 py-4 flex justify-between items-center sticky top-0 bg-matte z-10">
            <h1 class="font-display font-bold text-xl tracking-[0.2em] uppercase">Knight Admin</h1>
            <button @click="logout()" class="text-sm uppercase tracking-wider text-silver hover:text-chrome transition-colors">Sign Out</button>
        </header>

        <main class="max-w-screen-xl mx-auto px-6 py-10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-display text-2xl font-bold uppercase">Products</h2>
                <button @click="addProduct()" class="bg-bone text-matte px-6 py-3 font-display font-bold uppercase tracking-widest text-xs hover:bg-offwhite transition-colors">
                    + Add Product
                </button>
            </div>

            <p x-show="toast" x-cloak x-text="toast" class="text-chrome text-sm mb-6 uppercase tracking-wider"></p>

            <template x-if="products.length === 0">
                <p class="text-silver text-sm">No products yet. Click "Add Product" to create your first one.</p>
            </template>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="p in products" :key="p.id">
                    <div class="bg-graphite border border-charcoal p-5">
                        <div class="aspect-[3/4] bg-charcoal mb-4 overflow-hidden">
                            <img :src="p.image || 'https://via.placeholder.com/400x533?text=No+Image'" :alt="p.name"
                                 class="w-full h-full object-cover"
                                 @error="$event.target.src = 'https://via.placeholder.com/400x533?text=Invalid+URL'">
                        </div>

                        <label class="block text-[10px] uppercase tracking-wider text-silver mb-1">Image URL</label>
                        <input x-model="p.image" type="text" placeholder="https://..."
                               class="w-full bg-matte border border-charcoal px-3 py-2 mb-3 text-xs focus:outline-none focus:border-chrome">

                        <label class="block text-[10px] uppercase tracking-wider text-silver mb-1">Name</label>
                        <input x-model="p.name" type="text"
                               class="w-full bg-matte border border-charcoal px-3 py-2 mb-3 text-sm focus:outline-none focus:border-chrome">

                        <label class="block text-[10px] uppercase tracking-wider text-silver mb-1">Subtitle</label>
                        <input x-model="p.subtitle" type="text"
                               class="w-full bg-matte border border-charcoal px-3 py-2 mb-3 text-sm focus:outline-none focus:border-chrome">

                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="block text-[10px] uppercase tracking-wider text-silver mb-1">Price ($)</label>
                                <input x-model.number="p.price" type="number" min="0" step="0.01"
                                       class="w-full bg-matte border border-charcoal px-3 py-2 text-sm focus:outline-none focus:border-chrome">
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase tracking-wider text-silver mb-1">Order</label>
                                <input x-model.number="p.order" type="number"
                                       class="w-full bg-matte border border-charcoal px-3 py-2 text-sm focus:outline-none focus:border-chrome">
                            </div>
                        </div>

                        <label class="block text-[10px] uppercase tracking-wider text-silver mb-1">Badge (optional)</label>
                        <input x-model="p.badge" type="text" placeholder="e.g. New, Sold Out"
                               class="w-full bg-matte border border-charcoal px-3 py-2 mb-4 text-sm focus:outline-none focus:border-chrome">

                        <div class="flex gap-3">
                            <button @click="saveProduct(p)" class="flex-1 bg-bone text-matte py-2 font-display font-bold uppercase tracking-widest text-xs hover:bg-offwhite transition-colors">
                                Save
                            </button>
                            <button @click="deleteProduct(p)" class="flex-1 border border-crimson text-crimson py-2 font-display font-bold uppercase tracking-widest text-xs hover:bg-crimson hover:text-offwhite transition-colors">
                                Delete
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <script>
        function adminApp() {
            return {
                email: '', password: '', error: '',
                user: null, products: [], toast: '',

                init() {
                    const { auth, onAuthStateChanged } = window.knightAdmin;
                    onAuthStateChanged(auth, (u) => {
                        this.user = u;
                        if (u) this.listenToProducts();
                    });
                },

                login() {
                    const { auth, signInWithEmailAndPassword } = window.knightAdmin;
                    this.error = '';
                    signInWithEmailAndPassword(auth, this.email, this.password)
                        .catch((err) => { this.error = 'Sign in failed: ' + err.message; });
                },

                logout() {
                    const { auth, signOut } = window.knightAdmin;
                    signOut(auth);
                },

                listenToProducts() {
                    const { db, collection, query, orderBy, onSnapshot } = window.knightAdmin;
                    const productsQuery = query(collection(db, 'products'), orderBy('order', 'asc'));
                    onSnapshot(productsQuery, (snapshot) => {
                        this.products = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
                    }, (err) => { this.error = 'Could not load products: ' + err.message; });
                },

                addProduct() {
                    const { db, collection, addDoc } = window.knightAdmin;
                    addDoc(collection(db, 'products'), {
                        name: 'New Product',
                        subtitle: '',
                        price: 0,
                        image: '',
                        badge: '',
                        order: this.products.length
                    }).then(() => { this.showToast('Product added'); })
                      .catch((err) => { this.error = err.message; });
                },

                saveProduct(p) {
                    const { db, doc, updateDoc } = window.knightAdmin;
                    updateDoc(doc(db, 'products', p.id), {
                        name: p.name || '',
                        subtitle: p.subtitle || '',
                        price: Number(p.price) || 0,
                        image: p.image || '',
                        badge: p.badge || '',
                        order: Number(p.order) || 0
                    }).then(() => { this.showToast('Saved "' + p.name + '"'); })
                      .catch((err) => { this.error = err.message; });
                },

                deleteProduct(p) {
                    if (!confirm('Delete "' + p.name + '"? This cannot be undone.')) return;
                    const { db, doc, deleteDoc } = window.knightAdmin;
                    deleteDoc(doc(db, 'products', p.id))
                        .then(() => { this.showToast('Deleted "' + p.name + '"'); })
                        .catch((err) => { this.error = err.message; });
                },

                showToast(msg) {
                    this.toast = msg;
                    setTimeout(() => { this.toast = ''; }, 2500);
                }
            }
        }
    </script>
</body>
</html>
